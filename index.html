<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: #080808; color: #fff; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }
::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
select { -webkit-appearance: none; appearance: none; }
@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes shrink {
  from { width: 100%; }
  to   { width: 0%; }
}

<script>
// RÉCUPÉRATION D'URGENCE — tourne avant React
(function() {
  var KEYS = ['it3_sessions','it3_routines','it3_fatigue','it3_cycle','it3_current_session','it3_prog_version','it3_sns_reset'];
  
  function tryParse(key) {
    try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch(e) { return 'CORRUPT'; }
  }
  
  // Vérifier chaque clé
  var corrupt = false;
  
  // Vérifier sessions
  var sessions = tryParse('it3_sessions');
  if (sessions === 'CORRUPT') { corrupt = true; }
  else if (sessions && !Array.isArray(sessions)) { corrupt = true; }
  
  // Vérifier routines
  var routines = tryParse('it3_routines');
  if (routines === 'CORRUPT') { corrupt = true; }
  else if (routines && !Array.isArray(routines)) { corrupt = true; }
  else if (routines && routines.some(function(r) { return !r || typeof r !== 'object'; })) { corrupt = true; }
  
  // Vérifier current_session
  var cs = tryParse('it3_current_session');
  if (cs === 'CORRUPT') { try { localStorage.removeItem('it3_current_session'); } catch(e) {} }
  else if (cs && (!cs.exercises || !Array.isArray(cs.exercises))) {
    try { localStorage.removeItem('it3_current_session'); } catch(e) {}
  }
  
  if (corrupt) {
    console.log('TATANKA TRAINING: données corrompues détectées, purge automatique');
    // Sauvegarder les sessions valides avant purge
    if (sessions && Array.isArray(sessions)) {
      var valid = sessions.filter(function(s) { return s && s.date && Array.isArray(s.exercises); });
      try { localStorage.setItem('it3_sessions', JSON.stringify(valid)); } catch(e) {}
    } else {
      try { localStorage.removeItem('it3_sessions'); } catch(e) {}
    }
    try { localStorage.removeItem('it3_routines'); } catch(e) {}
    try { localStorage.removeItem('it3_prog_version'); } catch(e) {}
    try { localStorage.removeItem('it3_current_session'); } catch(e) {}
  }
})();
</script>

function e1RM(w, r) { const _w = parseFloat(w); const _r = parseInt(r); if (!_w || isNaN(_w) || !_r || isNaN(_r) || _r <= 0) return 0; return Math.round(_w * (1 + _r / 30)); }
function today() { return new Date().toISOString().split("T")[0]; }
function fmtDate(d) { if (!d) return ""; const p = d.split("-"); return p[2] + "/" + p[1]; }

function load(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(e) { return null; } }
function save(k, v) {

    localStorage.setItem(k, JSON.stringify(v));
  } catch(e) {

      alert("Stockage plein ! Exportez vos données via DATA puis supprimez les anciennes séances.");
    }
  }
}

function analyzeEx(history) {
  if (!history || history.length < 2) return null;
  const pts = history.map(s => ({
    date: s.date,
    best1RM: Math.max(0, ...s.sets.filter(st => st.weight && st.reps).map(st => e1RM(st.weight, st.reps))),
    avgReps: s.sets.filter(st => st.reps).reduce((a, st, _, arr) => a + parseInt(st.reps) / arr.length, 0),
    totalReps: s.sets.filter(st => st.reps && st.weight).reduce((a, st) => a + parseInt(st.reps), 0),
    maxWeight: Math.max(0, ...s.sets.filter(st => st.weight).map(st => parseFloat(st.weight))),
  })).filter(p => p.best1RM > 0);
  if (pts.length < 2) return null;
  const l = pts.length;
  const last3 = pts.slice(-3);
  const last = pts[l - 1];
  const prev = pts[l - 2];
  const jump = last.best1RM - prev.best1RM;
  const pct = jump / (prev.best1RM || 1);
  // Si la charge a augmente (reset reps apres montee de charge) : pas de regression
  const weightIncreased = last.maxWeight > prev.maxWeight;
  if (pct > 0.07 && jump > 3) return { type: 1, color: "#FFD600", icon: "!", urgency: "ATTENTION", title: "PROGRESSION TROP RAPIDE",
    msg: "+" + jump + "kg 1RM en 1 seance (" + Math.round(pct * 100) + "%). Risque de crash nerveux.",
    actions: ["+1 rep max par serie, jamais +2 d'un coup", "Prochaine seance : maintiens la meme charge", "Progression : derniere serie d'abord"] };
  if (last3.length >= 3) {
    const maxRM = Math.max(...pts.map(p => p.best1RM));
    if (last3.every(p => p.best1RM >= maxRM * 0.97) && last.avgReps >= 10.5 && last.avgReps < 20) return { type: 2, color: "#FF8C00", icon: "!", urgency: "ACTION REQUISE", title: "STAGNATION — PLAFOND",
      msg: "Bloque a " + last.best1RM + "kg 1RM depuis " + last3.length + " seances. Reps elevees = fin de cycle.",
      actions: ["Reset : repasse a 3x8 meme charge", "OU deplace en derniere position", "La progression repartira vite"] };
    const regression = last3.every((p, i) => i === 0 || p.best1RM <= last3[i - 1].best1RM);
    const totalLoss = last3[0].best1RM - last.best1RM;
    // Pas de regression si : charge montee (reset reps intentionnel) OU total reps en hausse
    const repsIncreased = last.totalReps > prev.totalReps;
    if (regression && totalLoss > last3[0].best1RM * 0.04 && !weightIncreased && !repsIncreased) return { type: 3, color: "#FF4444", icon: "!", urgency: "URGENT", title: "REGRESSION PERSISTANTE",
      msg: "1RM perd " + totalLoss + "kg sur 3 seances. Fatigue nerveuse probable.",
      actions: ["Reduis la charge de 5-10% maintenant", "Reprends a 3x8 (RIR 4-5)", "Verifie ton score SNS", "Controle sommeil, alimentation, stress"] };
  }
  // Progression si 1RM monte OU total reps monte (meme poids)
  const repsProgressed = last.totalReps > prev.totalReps && last.maxWeight >= prev.maxWeight;
  if (last.best1RM > prev.best1RM || repsProgressed) return { type: 0, color: "#00C853", icon: "V", urgency: "EN PROGRESSION", title: "PROGRESSION OPTIMALE",
    msg: last.best1RM > prev.best1RM ? "+" + (last.best1RM - prev.best1RM) + "kg 1RM depuis la derniere seance." : "+" + (last.totalReps - prev.totalReps) + " rep(s) au total depuis la derniere seance.",
    actions: ["+1 rep sur la derniere serie si tu atteins le haut de la fourchette"] };
  return { type: -1, color: "#888", icon: "-", urgency: "STABLE", title: "CHARGE MAINTENUE",
    msg: "Meme performance que la seance precedente.", actions: ["Essaie +1 rep sur la derniere serie seulement"] };
}

// Conseil de progression  pour une séance
// Règle exacte : +1 rep sur DERNIERE série d'abord
// 8-8-8 → 8-8-9 → 8-9-9 → 9-9-9 → augmenter poids
// Gère aussi les séries de 100 et les plages variables (10-15)
function getProgressionTip(lastSets, sessions, exName, repsTarget) {
  if (!lastSets || lastSets.length === 0) return null;
  const validLast = lastSets.filter(s => s.weight && s.reps);
  if (validLast.length === 0) return null;
  // RIR moyen — affine le conseil
  const avgRIR = Math.round(validLast.reduce((a, s) => a + (parseInt(s.rir) || 2), 0) / validLast.length);
  const rirNote = avgRIR >= 4 ? " · RIR élevé → pousse plus fort" : avgRIR <= 1 ? " · RIR faible → sois prudent" : "";

  // Série de 100 — pas de conseil de progression classique
  if (repsTarget === "100") return {
    color: "#9C27B0", icon: "★",
    msg: "SERIE DE 100 — charge légère, rest-pause 1-5 sec autorisé. Vise les 100 reps en continu à terme."
  };

  // Gestion plage reps (ex: "8-12", "10-15", "45-60s")
  if (repsTarget && repsTarget.includes("s")) return null; // gainage en secondes
  const rtParts = repsTarget ? repsTarget.split("-") : [];
  const maxReps = rtParts[1] ? parseInt(rtParts[1]) : (rtParts[0] ? parseInt(rtParts[0]) : 12);
  const minReps = rtParts[0] ? parseInt(rtParts[0]) : 8;
  // Récupère le nb de sets attendus depuis le programme (3 par défaut)
  const progExRef = typeof PROGRAMME !== "undefined"
    ? PROGRAMME.flatMap(r => r.exercises).find(e => e.name === exName)
    : null;
  const expectedSets = progExRef ? progExRef.sets : 3;
  // Sets manquants (séance passée incomplète) — Option B :
  // Les sets fantômes (dupliqués) sont marqués, et targetIdx les priorise
  const missingCount = Math.max(0, expectedSets - validLast.length);
  const firstPhantomIdx = validLast.length; // index du premier set fantôme
  const paddedLast = missingCount > 0
    ? [...validLast, ...Array.from({ length: missingCount }, () => validLast[validLast.length - 1])]
    : validLast;
  const lastRepsArr = paddedLast.map(s => parseInt(s.reps));
  const lastWeight = parseFloat(validLast[0].weight);
  const nbSets = lastRepsArr.length;

  // Historique stagnation — uniquement pour séries courtes (max <= 20 reps)
  // Pour séries longues (30-50), le 1RM estimé est instable → pas d'analyse
  if (maxReps <= 20) {
    const hist = sessions.filter(s => s.exercises && s.exercises.some(e => e.name === exName))
      .map(s => { const ex = s.exercises.find(e => e.name === exName); return { date: s.date, sets: (ex && ex.sets) || [] }; });
    const diag = (hist.length >= 2 && maxReps <= 15) ? analyzeEx(hist) : null;
    if (diag && diag.type === 3) return {
      color: "#FF4444", icon: "!",
      msg: "Régression — réduis de 5-10% et repars à RIR 4 minimum"
    };
    if (diag && diag.type === 1) return {
      color: "#FFD600", icon: "!",
      msg: "Progression rapide — maintiens " + lastWeight + "kg, consolide les reps avant d'augmenter"
    };
  }

  // TOUTES les séries au max → augmenter le poids
  const allAtMax = lastRepsArr.every(r => r >= maxReps);
  if (allAtMax) {
    const increment = lastWeight >= 20 ? 2.5 : 1.25;
    const newWeight = Math.round((lastWeight + increment) / increment) * increment;
    return {
      color: "#00C853", icon: "+",
      msg: "✓ AUGMENTE → " + lastWeight + "kg +" + increment + " = " + newWeight + "kg · Repars à " + minReps + " reps" + rirNote
    };
  }

  // S3 progresse en premier, puis S2, puis S1
  // 8-8-8 → S3 | 8-8-9 → S2 | 8-9-9 → S1 | 9-9-9 → augmente poids
  // Option B : si des sets sont fantômes (séance passée incomplète),
  // le premier set fantôme est prioritaire — il n'a jamais été fait
  let targetIdx = -1;
  if (missingCount > 0) {
    // Le premier set fantôme doit être fait en priorité
    targetIdx = firstPhantomIdx;
  } else {
    // Logique normale : cherche depuis la fin la série en retard
    for (let i = nbSets - 2; i >= 0; i--) {
      if (lastRepsArr[i] < lastRepsArr[i + 1]) {
        targetIdx = i;
        break;
      }
    }
    // Toutes égales mais pas au max → c'est la dernière (S3) qui progresse
    if (targetIdx === -1 && lastRepsArr[nbSets - 1] < maxReps) {
      targetIdx = nbSets - 1;
    }
  }
  if (targetIdx !== -1) {
    const nextReps = lastRepsArr[targetIdx] + 1;
    const isLastStep = nextReps >= maxReps && lastRepsArr.filter((r, i) => i !== targetIdx).every(r => r >= maxReps);
    const phantomNote = missingCount > 0 && targetIdx >= firstPhantomIdx ? " · série non faite la dernière fois" : "";
    return {
      color: missingCount > 0 && targetIdx >= firstPhantomIdx ? "#FF8C00" : "#4FC3F7",
      icon: missingCount > 0 && targetIdx >= firstPhantomIdx ? "!" : ">",
      msg: "S" + (targetIdx + 1) + " : vise " + nextReps + " rep · " + lastWeight + "kg" + phantomNote + (isLastStep ? " · Puis +poids" : "") + rirNote
    };
  }

  return {
    color: "#888", icon: "=",
    msg: "Maintiens " + lastWeight + "kg · Vise " + minReps + " reps minimum sur toutes les séries"
  };
}

function SessionTab({ sessions, setSessions, activeRoutine, setActiveRoutine, routines, currentSets, setCurrentSets, sessionRecovered, setSessionRecovered, setTab, restSec, setRestSec, restTarget, setRestTarget, timerOn, setTimerOn, timerDone, setTimerDone, seanceStartTime, setSeanceStartTime, seanceElapsed, setSeanceElapsed }) {
  const [showPicker, setShowPicker] = useState(false);
  const [showHistory, setShowHistory] = useState(false);
  const [lastSetInfo, setLastSetInfo] = useState(null);
  const [stagAlert, setStagAlert] = useState(null);
  const [replaceIdx, setReplaceIdx] = useState(null);
  const [validationToast, setValidationToast] = useState(null);
  const [postSeanceModal, setPostSeanceModal] = useState(null);
  const [adaptModal, setAdaptModal] = useState(null);

  // Démarrer le chrono de séance si pas encore démarré
  useEffect(() => {
    if (currentSets && !seanceStartTime) {
      setSeanceStartTime(Date.now());
    }
  }, [currentSets]);

  useEffect(() => {
    if (!currentSets || !seanceStartTime) return;
    const interval = setInterval(() => setSeanceElapsed(Math.floor((Date.now() - seanceStartTime) / 1000)), 1000);
    return () => clearInterval(interval);
  }, [currentSets, seanceStartTime]);
  const [toast, setToast] = useState(null);
  const timerRef = useRef(null);
  const wakeLockRef = useRef(null);
  useEffect(() => {
    async function requestWakeLock() {
      try { if ("wakeLock" in navigator) { wakeLockRef.current = await navigator.wakeLock.request("screen"); } } catch(e) {}
    }
    requestWakeLock();
    async function handleVisibility() {
      if (document.visibilityState === "visible") {
        try { if ("wakeLock" in navigator) { wakeLockRef.current = await navigator.wakeLock.request("screen"); } } catch(e) {}
      }
    }
    document.addEventListener("visibilitychange", handleVisibility);
    return () => {
      document.removeEventListener("visibilitychange", handleVisibility);
      if (wakeLockRef.current) { wakeLockRef.current.release().catch(() => {}); }
    };
  }, []);
  function showToast(msg, color) { setToast({ msg, color }); setTimeout(() => setToast(null), 2500); }

  // Rejouer une séance passée — précharge les charges de cette séance
  function replaySession(pastSession) {
    const exercises = pastSession.exercises.map(ex => {
      const pastSets = (ex.sets && ex.sets.length > 0) ? ex.sets : [{ weight: "", reps: "" }, { weight: "", reps: "" }, { weight: "", reps: "" }];
      const progEx = PROGRAMME.flatMap(r => r.exercises).find(e => e.name === ex.name);
      return {
        name: ex.name,
        repsTarget: (progEx && progEx.repsTarget) || ex.repsTarget || "8-12",
        note: (progEx && progEx.note) || ex.note || "",
        rest: (progEx && progEx.rest) || ex.rest || 90,
        warmupSets: (progEx && progEx.warmupSets) || ex.warmupSets || 0,
        warmupLabel: (progEx && progEx.warmupLabel) || ex.warmupLabel || "",
        userNote: ex.userNote || "",
        lastSets: ex.sets,
        sets: pastSets.map((s, i) => ({
          weight: s.weight || "", reps: "",
          rir: i === 0 ? "4" : i === 1 ? "2" : "1", done: false
        }))
      };
    });
    setCurrentSets({ routineId: pastSession.routineId, routineName: pastSession.routineName + " (reprise)", exercises });
    setShowHistory(false);
  }

  // Déplacer un exercice pendant la séance en cours
  function moveExInSession(idx, dir) {
    setCurrentSets(prev => {
      const exs = [...prev.exercises];
      const s = idx + dir;
      if (s < 0 || s >= exs.length) return prev;
      [exs[idx], exs[s]] = [exs[s], exs[idx]];
      return { ...prev, exercises: exs };
    });
  }

  const audioCtxRef = useRef(null);
  // Débloque l'AudioContext iOS au premier touch
  useEffect(() => {
    function unlockAudio() {
      if (!audioCtxRef.current) {
        try { audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
      }
      if (audioCtxRef.current && audioCtxRef.current.state === "suspended") {
        audioCtxRef.current.resume().catch(() => {});
      }
    }
    document.addEventListener("touchstart", unlockAudio, { once: true });
    document.addEventListener("click", unlockAudio, { once: true });
    return () => { document.removeEventListener("touchstart", unlockAudio); document.removeEventListener("click", unlockAudio); };
  }, []);

  function playBeeps() {
    try {
      const ctx = audioCtxRef.current || new (window.AudioContext || window.webkitAudioContext)();
      if (!audioCtxRef.current) audioCtxRef.current = ctx;
      const resume = ctx.state === "suspended" ? ctx.resume() : Promise.resolve();
      resume.then(() => {
        [0, 200, 400].forEach((delay, i) => {
          const osc = ctx.createOscillator(); const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = i === 2 ? 1100 : 880; osc.type = "sine";
          const t = ctx.currentTime + delay / 1000;
          gain.gain.setValueAtTime(0.4, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
          osc.start(t); osc.stop(t + 0.3);
        });
      });
    } catch(e) {}
  }

  useEffect(() => {
    if (activeRoutine) {
      const exercises = activeRoutine.exercises.map(ex => {
        const progExRef2 = PROGRAMME.flatMap(r => r.exercises).find(e => e.name === ex.name);
        const lastSession = [...sessions].reverse().find(s => s.exercises && s.exercises.some(e => e.name === ex.name));
        const lastEx = lastSession ? lastSession.exercises.find(e => e.name === ex.name) : null;
        const lastSets = ((lastEx && lastEx.sets) || []).filter(s => s.weight && s.reps);
        return {
          name: ex.name, repsTarget: ex.repsTarget || (progExRef2 && progExRef2.repsTarget) || "8-12", note: ex.note || (progExRef2 && progExRef2.note) || "", userNote: "", rest: ex.rest || 90, warmupSets: ex.warmupSets || (progExRef2 && progExRef2.warmupSets) || 0, warmupLabel: ex.warmupLabel || (progExRef2 && progExRef2.warmupLabel) || "", lastSets,
          sets: Array.from({ length: ex.sets || 3 }, (_, i) => ({
            weight: (lastSets[i] && lastSets[i].weight) || (lastSets[0] && lastSets[0].weight) || "", reps: "",
            rir: i === 0 ? "3" : i === 1 ? "2" : "1", done: false
          }))
        };
      });
      setCurrentSets({ routineId: activeRoutine.id, routineName: activeRoutine.name, exercises });
      setActiveRoutine(null);
      setTimeout(() => window.scrollTo({ top: 0, behavior: "smooth" }), 50);

      // Score de récupération
      
  const MUSCLE_MAP = {
    "Élévations latérales": "Épaules", "Développé militaire": "Épaules", "Développé couché": "Pectoraux",
    "Écarté": "Pectoraux", "Extension triceps": "Triceps", "Dips": "Triceps",
    "Oiseau": "Deltoïde post.", "Tractions": "Dos", "Tirage": "Dos", "Rowing": "Dos",
    "Pull-over": "Dos", "Curl": "Biceps", "Adducteurs": "Jambes", "Leg extension": "Quadriceps",
    "Hack squat": "Quadriceps", "Leg press": "Quadriceps", "Leg curl": "Ischio-jambiers",
    "Mollets": "Mollets"
  };
  function getMuscle(exName) {
    return Object.entries(MUSCLE_MAP).find(([k]) => exName.includes(k))?.[1] || "Autre";
  }
      const routineMuscles = [...new Set(exercises.map(ex => getMuscle(ex.name)))];
      const now2 = new Date();
      let minHoursSince = 999;
      routineMuscles.forEach(muscle => {
        const lastS = [...sessions].reverse().find(s => s.exercises && s.exercises.some(ex => getMuscle(ex.name) === muscle));
        if (lastS) {
          const hours = Math.round((now2 - new Date(lastS.date)) / 3600000);
          if (hours < minHoursSince) minHoursSince = hours;
        }
      });
      // Score récup : < 24h = insuffisant, 24-48h = moyen, 48-72h = bon, > 72h = optimal
      const recovScore = minHoursSince >= 72 ? "optimal" : minHoursSince >= 48 ? "bon" : minHoursSince >= 24 ? "moyen" : "insuffisant";
      const recovColor = { optimal: "#00C853", bon: "#4FC3F7", moyen: "#FFD600", insuffisant: "#FF4444" }[recovScore];

      // Adaptation dynamique SNS — lire depuis localStorage
      const snsScore = Object.values((function(){ try{ return JSON.parse(localStorage.getItem("it3_fatigue")||"{}"); }catch(e){return{};} })()).reduce((a,b)=>a+(parseInt(b)||0),0);
      if (snsScore >= 8) {
        setAdaptModal({
          score: snsScore,
          routine: activeRoutine.name,
          level: snsScore >= 13 ? "danger" : snsScore >= 10 ? "alerte" : "surveille",
          recovScore, recovColor, minHoursSince: minHoursSince === 999 ? null : minHoursSince
        });
      } else if (recovScore === "insuffisant") {
        setAdaptModal({
          score: snsScore, routine: activeRoutine.name, level: "surveille",
          recovScore, recovColor, minHoursSince
        });
      }
    }
  }, [activeRoutine]);

  useEffect(() => {
    if (timerOn) {
      setTimerDone(false);
      timerRef.current = setInterval(() => {
        setRestSec(s => {
          if (s >= restTarget) { clearInterval(timerRef.current); setTimerOn(false); setTimerDone(true); playBeeps(); return restTarget; }
          return s + 1;
        });
      }, 1000);
    }
    return () => clearInterval(timerRef.current);
  }, [timerOn, restTarget]);

  function startTimer(exName, setNum, duration) {
    clearInterval(timerRef.current);
    setRestSec(0);
    if (duration) setRestTarget(duration);
    setTimerOn(true); setTimerDone(false);
    if (exName) setLastSetInfo({ exName, setNum });
  }

  function checkStagnation(exName, newSets) {
    // Pas d'analyse stagnation sur séries longues (30-50 reps) — 1RM instable
    const exData = currentSets && currentSets.exercises.find(e => e.name === exName);
    const rt = exData && exData.repsTarget;
    const rtMax = rt ? parseInt((rt.split("-")[1] || rt.split("-")[0])) : 12;
    if (rtMax > 15) return;
    const setsArr = Array.isArray(newSets) ? newSets : [newSets];
    const hist = sessions.filter(s => s.exercises && s.exercises.some(e => e.name === exName))
      .map(s => { const ex = s.exercises.find(e => e.name === exName); return { date: s.date, sets: (ex && ex.sets) || [] }; });
    if (hist.length < 2) return;
    const diag = analyzeEx([...hist, { date: today(), sets: setsArr }]);
    if (diag && diag.type > 0) setStagAlert({ ...diag, exName });
  }

  function updateSet(exIdx, setIdx, field, val) {
    setCurrentSets(prev => {
      const updated = {
        ...prev, exercises: prev.exercises.map((ex, ei) =>
          ei !== exIdx ? ex : { ...ex, sets: (ex.sets || []).map((s, si) => si === setIdx ? { ...s, [field]: val } : s) }
        )
      };
      // Auto-save en cours de séance pour ne pas perdre les données
      try { localStorage.setItem("it3_current_session", JSON.stringify(updated)); } catch(e) {}
      return updated;
    });
    // Analyse post-sauvegarde uniquement
  }

  function markSetDone(exIdx, setIdx) {
    const ex = currentSets.exercises[exIdx];
    const exSets2 = ex.sets || [];
    if (!exSets2[setIdx]) return;
    if (!exSets2[setIdx].reps) { alert("Saisis le nombre de reps avant de valider la série."); return; }
    if (!exSets2[setIdx].weight) { alert("Saisis la charge avant de valider la série."); return; }
    const wasNotDone = !exSets2[setIdx].done;
    const updatedSets = exSets2.map((s, si) => si === setIdx ? { ...s, done: !s.done } : s);
    setCurrentSets(prev => ({
      ...prev, exercises: prev.exercises.map((e, ei) =>
        ei !== exIdx ? e : { ...e, sets: updatedSets }
      )
    }));
    if (wasNotDone) {
      try { if (navigator.vibrate) navigator.vibrate(40); } catch(e) {}
      // Détecter PR
      const currentSet = exSets2[setIdx];
      let isPR = false;
      if (currentSet && currentSet.weight && currentSet.reps) {
        const currentRM = parseFloat(currentSet.weight) * (1 + parseInt(currentSet.reps) / 30);
        // Séances passées sauvegardées
        const pastRM = sessions.flatMap(s => (s.exercises||[]).filter(e=>e.name===ex.name).flatMap(e=>(e.sets||[]).filter(st=>st.weight&&st.reps).map(st=>parseFloat(st.weight)*(1+parseInt(st.reps)/30))));
        // Séries déjà validées dans la séance en cours (hors série actuelle)
        const currentSessionRM = exSets2.filter((s, si) => si !== setIdx && s.done && s.weight && s.reps).map(s => parseFloat(s.weight) * (1 + parseInt(s.reps) / 30));
        const allPastRM = [...pastRM, ...currentSessionRM];
        const maxPastRM = allPastRM.length > 0 ? Math.max(...allPastRM) : 0;
        // PR si 1RM strictement supérieur, OU si égal au max mais avec plus de reps (même charge)
        const prevMaxReps = allPastRM.length > 0
          ? Math.max(...sessions.flatMap(s=>(s.exercises||[]).filter(e=>e.name===ex.name).flatMap(e=>(e.sets||[]).filter(st=>st.weight&&st.reps&&Math.abs(parseFloat(st.weight)-parseFloat(currentSet.weight))<0.01).map(st=>parseInt(st.reps)))), ...exSets2.filter((s,si)=>si!==setIdx&&s.done&&s.weight&&Math.abs(parseFloat(s.weight)-parseFloat(currentSet.weight))<0.01&&s.reps).map(s=>parseInt(s.reps)))
          : 0;
        const sameWeightMoreReps = prevMaxReps > 0 && parseInt(currentSet.reps) > prevMaxReps;
        isPR = allPastRM.length > 0 && (currentRM > maxPastRM || sameWeightMoreReps);
      }
      setValidationToast({ setNum: setIdx + 1, exName: ex.name, rest: ex.rest || 90, isPR });
      setTimeout(() => setValidationToast(null), isPR ? 3000 : 2200);
      startTimer(ex.name, setIdx + 1, ex.rest || 90);
      // Analyse stagnation uniquement quand la dernière série est validée
      const stagSet = exSets2[setIdx];
      if (setIdx === exSets2.length - 1 && stagSet && stagSet.weight && stagSet.reps) {
        const validSets = updatedSets.filter(s => s.weight && s.reps);
        if (validSets.length > 0) checkStagnation(ex.name, validSets);
      }
    }
  }

  function addSet(exIdx) {
    setCurrentSets(prev => {
      const exs = [...prev.exercises];
      const last = exs[exIdx].sets[exs[exIdx].sets.length - 1];
      exs[exIdx] = { ...exs[exIdx], sets: [...exs[exIdx].sets, { weight: (last && last.weight) || "", reps: "", rir: "1", done: false }] };
      return { ...prev, exercises: exs };
    });
  }

  function saveSession() {
    // Nettoyage : on sauvegarde UNIQUEMENT les données saisies, sans lastSets ni meta
    const validExs = (currentSets.exercises || []).map(ex => ({
      name: ex.name,
      repsTarget: ex.repsTarget,
      note: ex.note || "",
      userNote: ex.userNote || "",
      rest: ex.rest || 90,
      sets: ex.sets
        .filter(s => s.weight && s.reps)
        .map(s => ({ weight: parseFloat(s.weight), reps: parseInt(s.reps), rir: parseInt(s.rir) || 2, done: true }))
    })).filter(ex => ex.sets.length > 0);

    if (!validExs.length) return alert("Aucune serie remplie !");

    // Vérifier les séries non cochées V
    const notDone = [];
    currentSets.exercises.forEach(ex => {
      (ex.sets || []).forEach((s, si) => {
        if (s.weight && s.reps && !s.done) {
          notDone.push(ex.name + " S" + (si + 1));
        }
      });
    });
    if (notDone.length > 0) {
      const msg = "⚠️ Ces séries ont des données mais ne sont pas cochées V :\n\n" +
        notDone.join("\n") +
        "\n\nSauvegarder quand même ?";
      if (!window.confirm(msg)) return;
    }

    const totalExpected = currentSets.exercises.reduce((a, ex) => a + (ex.sets || []).length, 0);
    const totalDone = validExs.reduce((a, ex) => a + ex.sets.length, 0);
    if (totalDone < totalExpected * 0.5 && !window.confirm("Seulement " + totalDone + " série(s) sur " + totalExpected + " remplies. Sauvegarder quand même ?")) return;
    const todaySessions = sessions.filter(s => s.date === today() && s.routineId === currentSets.routineId);
    if (todaySessions.length > 0 && !confirm("Tu as déjà enregistré cette routine aujourd'hui. Sauvegarder quand même ?")) return;

    // Analyse stagnation post-séance
    const alerts = [];
    validExs.forEach(ex => {
      // Pas d'analyse stagnation sur séries longues (30-50 reps)
      const rtMax3 = ex.repsTarget ? parseInt((ex.repsTarget.split("-")[1] || ex.repsTarget.split("-")[0])) : 12;
      if (rtMax3 > 15) return;
      const hist = sessions.filter(s => s.exercises && s.exercises.some(e => e.name === ex.name))
        .map(s => { const e2 = s.exercises.find(e => e.name === ex.name); return { date: s.date, sets: (e2 && e2.sets) || [] }; });
      const diag = analyzeEx([...hist, { date: today(), sets: ex.sets }]);
      if (diag && diag.type > 0) alerts.push({ ...diag, exName: ex.name });
    });

    const session = {
      id: Date.now(),
      date: today(),
      routineId: currentSets.routineId,
      routineName: currentSets.routineName,
      exercises: validExs
    };
    const updated = [...sessions, session];
    setSessions(updated);
    save(KEYS.sessions, updated);
    try { localStorage.removeItem("it3_current_session"); setSessionRecovered(false); } catch(e) {}

    // Analyse post-séance
    const tonnageSession = validExs.reduce((a, ex) => a + ex.sets.reduce((b, s) => b + s.weight * s.reps, 0), 0);
    const lastSameRoutine = sessions.filter(s => s.routineId === currentSets.routineId).slice(-1)[0];
    const tonnagePrev = lastSameRoutine ? lastSameRoutine.exercises.reduce((a, ex) => a + (ex.sets||[]).reduce((b, s) => b + parseFloat(s.weight||0) * parseInt(s.reps||0), 0), 0) : 0;
    const tonnageDiff = tonnagePrev > 0 ? Math.round(((tonnageSession - tonnagePrev) / tonnagePrev) * 100) : 0;

    // Exercices progressés / stagnes / régressés
    const progressed = [], stagnated = [], regressed = [];
    validExs.forEach(ex => {
      const prevSession = sessions.filter(s => s.exercises && s.exercises.some(e => e.name === ex.name)).slice(-1)[0];
      if (!prevSession) return;
      const prevEx = prevSession.exercises ? prevSession.exercises.find(e => e.name === ex.name) : null;
      if (!prevEx) return;
      const prevT = (prevEx.sets||[]).reduce((a,s)=>a+parseFloat(s.weight||0)*parseInt(s.reps||0),0);
      const curT = ex.sets.reduce((a,s)=>a+s.weight*s.reps,0);
      if (curT > prevT * 1.02) progressed.push(ex.name);
      else if (curT < prevT * 0.98) regressed.push(ex.name);
      else stagnated.push(ex.name);
    });

    // PRs de la séance
    const sessionPRs = [];
    validExs.forEach(ex => {
      ex.sets.forEach(s => {
        const rm = s.weight * (1 + s.reps / 30);
        const allPast = sessions.flatMap(sess => (sess.exercises||[]).filter(e=>e.name===ex.name).flatMap(e=>(e.sets||[]).map(st=>parseFloat(st.weight||0)*(1+parseInt(st.reps||0)/30))));
        if (allPast.length > 0 && rm > Math.max(...allPast) * 1.01) {
          if (!sessionPRs.includes(ex.name)) sessionPRs.push(ex.name);
        }
      });
    });

    setCurrentSets(null);
    setSeanceStartTime(null);
    setSeanceElapsed(0);
    setRestSec(0);
    setTimerOn(false);

    if (alerts.length > 0) {
      setStagAlert({ ...alerts[0], allAlerts: alerts, alertIndex: 0 });
    } else {
      setPostSeanceModal({
        routineName: currentSets.routineName,
        tonnage: Math.round(tonnageSession),
        tonnageDiff,
        progressed, stagnated, regressed,
        sessionPRs,
        totalSets: validExs.reduce((a,ex)=>a+ex.sets.length,0),
        nbEx: validExs.length
      });
    }
  }

  if (!currentSets) return (
    <div style={{ padding: "16px 16px 80px" }}>
      <div style={{ marginBottom: 18 }}>
        <div style={{ fontSize: 9, color: "#555", fontFamily: "monospace", letterSpacing: "0.12em" }}>{today()}</div>
        <h2 style={{ margin: "3px 0 0", fontSize: 22, fontWeight: 900, color: "#ff6600" }}>SEANCE DU JOUR</h2>
      </div>
      {(routines || []).filter(r => r && r.name).map(r => {
        const dc = { "LUNDI": "#FF6600", "MARDI": "#4CAF50", "MERCREDI": "#FFC107", "JEUDI": "#FF6600", "VENDREDI": "#4CAF50" }[r.day] || "#ff6600";
        const exCount = (r.exercises || []).length;
        return (
          <Card key={r.id}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ flex: 1 }}>
                {r.day && <div style={{ fontSize: 9, color: dc, fontFamily: "monospace", fontWeight: 900, marginBottom: 2 }}>{r.day}</div>}
                <div style={{ fontSize: 14, fontWeight: 800, color: "#fff" }}>{r.name}</div>
                <div style={{ fontSize: 10, color: "#444", marginTop: 2 }}>{exCount} exercices</div>
              </div>
              <Btn primary small label="GO" onClick={() => setActiveRoutine({ ...r, exercises: r.exercises || [] })} />
            </div>
          </Card>
        );
      })}
      <Btn label="+ SEANCE LIBRE" onClick={() => setCurrentSets({ routineId: null, routineName: "Seance libre", exercises: [] })} style={{ width: "100%", marginTop: 12 }} />
      {sessionRecovered && !currentSets && (
        <div style={{ marginTop: 12, background: "#1a0a00", border: "1px solid #ff660044", borderRadius: 10, padding: "10px 14px", fontSize: 11, color: "#ff8800" }}>
          ⚡ Séance interrompue récupérée — relance une routine pour reprendre
        </div>
      )}

      {sessions.length === 0 && (
        <div style={{ background: "#0d0d0d", borderRadius: 12, padding: "24px 16px", marginBottom: 16, border: "1px solid #1d1d1d", textAlign: "center" }}>
          <div style={{ fontSize: 32, marginBottom: 10 }}>🏋️</div>
          <div style={{ fontSize: 14, color: "#ff6600", fontWeight: 900, marginBottom: 8 }}>Bienvenue sur TATANKA TRAINING</div>
          <div style={{ fontSize: 11, color: "#666", lineHeight: 1.8 }}>
            1. Va dans <span style={{ color: "#ff6600", fontWeight: 700 }}>ROUTINES</span> pour choisir ta séance<br/>
            2. Lance la séance et saisis tes charges<br/>
            3. L'app suit ta progression automatiquement
          </div>
        </div>
      )}
      {/* DERNIÈRES SÉANCES — précharge automatique des charges */}
      {sessions.length > 0 && (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 20, marginBottom: 8 }}>
            <div style={{ fontSize: 9, color: "#555", fontFamily: "monospace", letterSpacing: "0.1em" }}>DERNIERES SEANCES</div>
            <button onClick={() => setShowHistory(h => !h)} style={{ background: "none", border: "none", color: "#ff6600", fontSize: 10, cursor: "pointer", fontFamily: "monospace", fontWeight: 700 }}>
              {showHistory ? "MASQUER" : "VOIR TOUT"}
            </button>
          </div>
          {(showHistory ? sessions.slice().reverse() : sessions.slice(-3).reverse()).map(s => {
            const totalSets = s.exercises.reduce((a, ex) => a + ((ex.sets || []).filter(st => st.weight && st.reps).length), 0);
            if (totalSets === 0) return null;
            return (
              <Card key={s.id} style={{ padding: "10px 14px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 9, color: "#ff6600", fontFamily: "monospace", fontWeight: 900 }}>{s.date}</div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", marginTop: 2 }}>{s.routineName}</div>
                    <div style={{ fontSize: 10, color: "#444", marginTop: 2 }}>
                      {s.exercises.length} exercices · {totalSets} séries · {Math.round(s.exercises.reduce((a,ex)=>(ex.sets||[]).filter(st=>st.weight&&st.reps).reduce((b,st)=>b+parseFloat(st.weight||0)*parseInt(st.reps||0),a),0))}kg
                    </div>
                  </div>
                  <button onClick={() => replaySession(s)} style={{ background: "#1a0a00", border: "1px solid #ff660044", color: "#ff6600", borderRadius: 8, padding: "7px 12px", fontSize: 11, fontWeight: 900, cursor: "pointer", whiteSpace: "nowrap" }}>
                    REPRODUIRE
                  </button>
                </div>
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );

  const timerPct = Math.min(100, (restSec / restTarget) * 100);
  const timerColor = timerPct < 70 ? "#ff6600" : timerPct < 90 ? "#ffcc00" : "#00e676";
  const totalDone = currentSets.exercises.reduce((a, ex) => a + ex.sets.filter(s => s.done).length, 0);
  const totalSets = currentSets.exercises.reduce((a, ex) => a + ex.sets.length, 0);

  return (
    <div style={{ padding: "16px 16px 80px" }}>
      {showPicker && <ExercisePicker onSelect={ex => {
        const _progEx = PROGRAMME.flatMap(r => r.exercises).find(e => e.name === ex);
        const _addLastSession = [...sessions].reverse().find(s => s.exercises && s.exercises.some(e => e.name === ex));
        const _addLastEx = _addLastSession ? _addLastSession.exercises.find(e => e.name === ex) : null;
        const _addLastSets = ((_addLastEx && _addLastEx.sets) || []).filter(s => s.weight && s.reps);
        const _addNbSets = (_progEx && _progEx.sets) || 3;
        setCurrentSets(prev => ({ ...prev, exercises: [...prev.exercises, {
          name: ex,
          repsTarget: (_progEx && _progEx.repsTarget) || "8-12",
          note: (_progEx && _progEx.note) || "",
          rest: (_progEx && _progEx.rest) || 90,
          warmupSets: (_progEx && _progEx.warmupSets) || 0,
          warmupLabel: (_progEx && _progEx.warmupLabel) || "",
          lastSets: _addLastSets,
          sets: Array.from({ length: _addNbSets }, (_, si) => ({
            weight: (_addLastSets[si] && _addLastSets[si].weight) || (_addLastSets[0] && _addLastSets[0].weight) || "",
            reps: "", rir: si === 0 ? "3" : si === 1 ? "2" : "1", done: false
          }))
        }] }));
        setShowPicker(false);
      }} onClose={() => setShowPicker(false)} />}
      {replaceIdx !== null && <ExercisePicker onSelect={ex => {
        const _rEx = PROGRAMME.flatMap(r => r.exercises).find(e => e.name === ex);
        // Cherche les derniers poids connus pour le nouvel exercice
        const _lastSession = [...sessions].reverse().find(s => s.exercises && s.exercises.some(e => e.name === ex));
        const _lastEx = _lastSession ? _lastSession.exercises.find(e => e.name === ex) : null;
        const _lastSets = ((_lastEx && _lastEx.sets) || []).filter(s => s.weight && s.reps);
        const _nbSets = (_rEx && _rEx.sets) || 3;
        setCurrentSets(prev => ({ ...prev, exercises: prev.exercises.map((e, i) => i !== replaceIdx ? e : {
          ...e, name: ex,
          repsTarget: (_rEx && _rEx.repsTarget) || "8-12",
          note: (_rEx && _rEx.note) || "",
          rest: (_rEx && _rEx.rest) || 90,
          warmupSets: (_rEx && _rEx.warmupSets) || 0,
          warmupLabel: (_rEx && _rEx.warmupLabel) || "",
          lastSets: _lastSets,
          sets: Array.from({ length: _nbSets }, (_, si) => ({
            weight: (_lastSets[si] && _lastSets[si].weight) || (_lastSets[0] && _lastSets[0].weight) || "",
            reps: "", rir: si === 0 ? "3" : si === 1 ? "2" : "1", done: false
          }))
        }) }));
        setReplaceIdx(null);
      }} onClose={() => setReplaceIdx(null)} />}
      {stagAlert && <StagnationAlert diag={stagAlert} onClose={() => setStagAlert(null)}
        onNext={() => {
          const all = stagAlert.allAlerts || []; const next = (stagAlert.alertIndex || 0) + 1;
          if (next < all.length) setStagAlert({ ...all[next], allAlerts: all, alertIndex: next }); else setStagAlert(null);
        }} />}

      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
        <button onClick={() => { if (confirm("Annuler la seance ?")) { setCurrentSets(null); setSeanceStartTime(null); setSeanceElapsed(0); setRestSec(0); setTimerOn(false); } }} style={{ background: "none", border: "none", color: "#555", fontSize: 20, cursor: "pointer", padding: 0 }}>{"<"}</button>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 14, fontWeight: 900, color: "#ff6600" }}>{currentSets.routineName}</div>
          <div style={{ fontSize: 9, color: "#444", fontFamily: "monospace" }}>{today()} · {totalDone}/{totalSets} séries</div>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <div style={{ background: "#1a0800", borderRadius: 8, padding: "4px 10px", textAlign: "center" }}>
            <div style={{ fontSize: 9, color: "#555", fontFamily: "monospace" }}>TEMPS</div>
            <div style={{ fontSize: 11, color: "#ff6600", fontWeight: 900, fontFamily: "monospace" }}>
              {Math.floor(seanceElapsed/60)}:{String(seanceElapsed%60).padStart(2,"0")}
            </div>
          </div>
          <div style={{ background: "#001a00", borderRadius: 8, padding: "4px 10px", textAlign: "center" }}>
            <div style={{ fontSize: 9, color: "#555", fontFamily: "monospace" }}>TONNAGE</div>
            <div style={{ fontSize: 11, color: "#00C853", fontWeight: 900, fontFamily: "monospace" }}>
              {Math.round(currentSets.exercises.reduce((a,ex)=>(ex.sets||[]).filter(s=>s.done&&s.weight&&s.reps).reduce((b,s)=>b+parseFloat(s.weight)*parseInt(s.reps),a),0))}kg
            </div>
          </div>
          <div style={{ background: "#1a1a1a", borderRadius: 8, padding: "4px 10px", textAlign: "center" }}>
            <div style={{ fontSize: 9, color: "#555", fontFamily: "monospace" }}>PROG.</div>
            <div style={{ fontSize: 11, color: "#ff6600", fontWeight: 900 }}>{totalSets > 0 ? Math.round((totalDone / totalSets) * 100) : 0}%</div>
          </div>
        </div>
      </div>

      <div style={{ background: "#1a1a1a", borderRadius: 4, height: 3, marginBottom: 12 }}>
        <div style={{ width: (totalSets > 0 ? (totalDone / totalSets) * 100 : 0) + "%", height: "100%", background: "#ff6600", borderRadius: 4, transition: "width 0.3s" }} />
      </div>

      {adaptModal && (
        <div style={{ position: "fixed", inset: 0, zIndex: 200, background: "rgba(0,0,0,0.92)", display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
          <div style={{ background: "#0d0d0d", border: "1px solid " + (adaptModal.level === "danger" ? "#FF4444" : adaptModal.level === "alerte" ? "#FF8C00" : "#FFD600") + "44", borderRadius: 20, padding: "24px 20px", width: "100%", maxWidth: 400 }}>
            <div style={{ fontSize: 28, marginBottom: 8, textAlign: "center" }}>{adaptModal.level === "danger" ? "🔴" : adaptModal.level === "alerte" ? "🟠" : "🟡"}</div>
            <div style={{ fontSize: 10, color: adaptModal.level === "danger" ? "#FF4444" : adaptModal.level === "alerte" ? "#FF8C00" : "#FFD600", fontFamily: "monospace", fontWeight: 900, letterSpacing: 2, marginBottom: 8, textAlign: "center" }}>
              SYSTÈME NERVEUX {adaptModal.level === "danger" ? "— DANGER" : adaptModal.level === "alerte" ? "— ALERTE" : "— SURVEILLANCE"}
            </div>
            <div style={{ fontSize: 14, fontWeight: 900, color: "#fff", marginBottom: 4, textAlign: "center" }}>Score SNS : {adaptModal.score}/18</div>
            {adaptModal.recovScore && (
              <div style={{ display: "flex", alignItems: "center", gap: 8, justifyContent: "center", marginBottom: 8 }}>
                <span style={{ fontSize: 11, color: "#666" }}>Récupération :</span>
                <span style={{ fontSize: 12, fontWeight: 900, color: adaptModal.recovColor }}>
                  {adaptModal.recovScore.toUpperCase()}
                  {adaptModal.minHoursSince !== null ? " (" + (adaptModal.minHoursSince < 24 ? adaptModal.minHoursSince + "h" : Math.round(adaptModal.minHoursSince/24) + "j") + ")" : ""}
                </span>
              </div>
            )}
            <div style={{ fontSize: 11, color: "#666", textAlign: "center", marginBottom: 20, lineHeight: 1.6 }}>
              {adaptModal.level === "danger"
                ? "Fatigue nerveuse critique. Risque de blessure élevé."
                : adaptModal.level === "alerte"
                ? "Fatigue notable. Performance réduite probable."
                : "Légère fatigue. Reste attentif à tes sensations."}
            </div>

            <div style={{ background: "#111", borderRadius: 12, padding: "14px 16px", marginBottom: 16 }}>
              <div style={{ fontSize: 10, color: "#ff6600", fontFamily: "monospace", fontWeight: 900, marginBottom: 10 }}>COACHING — ADAPTATIONS RECOMMANDÉES</div>
              {adaptModal.level === "danger" ? (
                <div>
                  <div style={{ fontSize: 11, color: "#ccc", marginBottom: 6, lineHeight: 1.6 }}>• Réduis à <strong style={{color:"#FF4444"}}>2 séries</strong> par exercice</div>
                  <div style={{ fontSize: 11, color: "#ccc", marginBottom: 6, lineHeight: 1.6 }}>• Charges <strong style={{color:"#FF4444"}}>-20%</strong> par rapport à d'habitude</div>
                  <div style={{ fontSize: 11, color: "#ccc", marginBottom: 6, lineHeight: 1.6 }}>• RIR minimum <strong style={{color:"#FF4444"}}>3-4</strong> sur toutes les séries</div>
                  <div style={{ fontSize: 11, color: "#ccc", lineHeight: 1.6 }}>• Repos <strong style={{color:"#FF4444"}}>+30 secondes</strong> entre les séries</div>
                </div>

function MiniCurve({ hist, color, valueKey }) {
  if (!hist || hist.length < 2) return null;
  const W = 280, H = 44, pad = 4;
  const key = valueKey || "best1RM";
  const vals = hist.map(p => p[key] || 0);
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const range = maxV - minV || 1;
  const pts = hist.map((p, i) => {
    const x = pad + (i / (hist.length - 1)) * (W - pad * 2);
    const y = H - pad - (((p[key] || 0) - minV) / range) * (H - pad * 2);
    return [x, y];
  });
  const polyline = pts.map(p => p[0] + "," + p[1]).join(" ");
  const area = "M" + pts[0][0] + "," + H + " " + pts.map(p => "L" + p[0] + "," + p[1]).join(" ") + " L" + pts[pts.length-1][0] + "," + H + " Z";
  return (
    <svg width="100%" viewBox={"0 0 " + W + " " + H} style={{ display: "block", marginTop: 8 }} preserveAspectRatio="none">
      <defs>
        <linearGradient id={"gc" + color.replace("#","") + "_" + (hist[0] && hist[0].date ? hist[0].date.replace(/-/g,"") : "") + "_" + hist.length} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25" />
          <stop offset="100%" stopColor={color} stopOpacity="0.02" />
        </linearGradient>
      </defs>
      <path d={area} fill={"url(#gc" + color.replace("#","") + "_" + (hist[0] && hist[0].date ? hist[0].date.replace(/-/g,"") : "") + "_" + hist.length + ")"} />
      <polyline points={polyline} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />
      {pts.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="2" fill={i === pts.length-1 ? color : "#1a1a1a"} stroke={color} strokeWidth="1" />)}
      <text x={pts[pts.length-1][0]} y={pts[pts.length-1][1] - 5} textAnchor="middle" fontSize="7" fill={color} fontFamily="monospace" fontWeight="900">{key === "tonnage" ? vals[vals.length-1] + "kg" : vals[vals.length-1] + "kg"}</text>
      <text x={pts[0][0]} y={H - 1} textAnchor="middle" fontSize="6" fill="#333" fontFamily="monospace">{hist[0].date ? hist[0].date.slice(5).replace("-","/") : ""}</text>
      <text x={pts[pts.length-1][0]} y={H - 1} textAnchor="middle" fontSize="6" fill="#333" fontFamily="monospace">{hist[hist.length-1].date ? hist[hist.length-1].date.slice(5).replace("-","/") : ""}</text>
    </svg>
  );
}

function CycleBilan({ sessions, onClose, onNewCycle }) {

  const exNames = [...new Set(cycleSessions.flatMap(s => (s.exercises || []).map(e => e.name)))];
  const exStats = exNames.map(name => {
    const hist = cycleSessions.filter(s => s.exercises && s.exercises.some(e => e.name === name))
      .map(s => { const ex = s.exercises.find(e => e.name === name); const sets = ((ex && ex.sets) || []).filter(st => st.weight && st.reps); const tonnage = sets.reduce((a, st) => a + parseFloat(st.weight) * parseInt(st.reps), 0); return { date: s.date, best1RM: Math.max(0, ...sets.map(st => e1RM(st.weight, st.reps))), tonnage: Math.round(tonnage) }; })
      .filter(p => p.best1RM > 0).sort((a, b) => a.date.localeCompare(b.date));
    if (hist.length < 3) return null;
    const firstT = hist[0].tonnage; const lastT = hist[hist.length - 1].tonnage;
    const gainT = lastT - firstT;
    const pct = firstT > 0 ? Math.round((gainT / firstT) * 100) : 0;
    return { name, sessions: hist.length, hist, firstT, lastT, gainT, pct };
  }).filter(Boolean).sort((a, b) => b.pct - a.pct);
  const progressed = exStats.filter(e => e.gainT > 0);
  const stagnated  = exStats.filter(e => e.gainT === 0);
  const regressed  = exStats.filter(e => e.gainT < 0);
  const weeks = Math.round((new Date(today()) - new Date(cycleData.startDate)) / 604800000);

          <div style={{ fontSize: 48, fontWeight: 900, color: sc }}>{cycleScore}<span style={{ fontSize: 20 }}>%</span></div>
          <div style={{ fontSize: 11, color: "#888", marginTop: 8 }}>{cycleScore >= 70 ? "Excellent cycle !" : cycleScore >= 40 ? "Cycle correct. Ajustements a faire." : "Cycle difficile. Voir recommandations."}</div>

// --- BILAN MENSUEL ---
function BilanMensuel({ sessions, onClose }) {
  const allMonths = [...new Set(sessions.map(s => s.date.slice(0, 7)))].sort().reverse();
  const [selectedMonth, setSelectedMonth] = React.useState(allMonths[0] || today().slice(0, 7));
  const monthSessions = sessions.filter(s => s.date.startsWith(selectedMonth));
  const prevMonth = allMonths[allMonths.indexOf(selectedMonth) + 1];
  const prevSessions = prevMonth ? sessions.filter(s => s.date.startsWith(prevMonth)) : [];
  const exNames = [...new Set(monthSessions.flatMap(s => (s.exercises || []).map(e => e.name)))];
  const exStats = exNames.map(name => {
    const getTonnage = (sess) => { const sets = sess.flatMap(s => (s.exercises || []).filter(e => e.name === name).flatMap(e => (e.sets || []).filter(st => st.weight && st.reps))); return Math.round(sets.reduce((a, st) => a + parseFloat(st.weight) * parseInt(st.reps), 0)); };
    const curT = getTonnage(monthSessions), prevT = getTonnage(prevSessions);
    const diff = prevT > 0 ? curT - prevT : null;
    const trend = diff === null ? "?" : diff > 0 ? "UP" : diff < 0 ? "DOWN" : "EQ";
    const trendIcon = trend === "UP" ? "↑" : trend === "DOWN" ? "↓" : "→";
    const trendColor = trend === "UP" ? "#00C853" : trend === "DOWN" ? "#FF4444" : "#888";
    const directive = trend === "UP" ? "Tonnage en hausse" : trend === "DOWN" ? "Tonnage en baisse" : "Tonnage stable";
    const hist = sessions.filter(s => s.exercises && s.exercises.some(e => e.name === name))
      .map(s => { const ex = (s.exercises || []).find(e => e.name === name); const sets = ((ex && ex.sets) || []).filter(st => st.weight && st.reps); const tonnage = sets.reduce((a, st) => a + parseFloat(st.weight) * parseInt(st.reps), 0); return { date: s.date, best1RM: sets.length ? Math.max(...sets.map(st => e1RM(st.weight, st.reps))) : 0, tonnage: Math.round(tonnage) }; })
      .filter(p => p.best1RM > 0).sort((a, b) => a.date.localeCompare(b.date));
    return { name, curT, diff, trendIcon, trendColor, directive, hist };
  }).filter(e => e.curT > 0);
  const score = exStats.length > 0 ? Math.round((exStats.filter(e => e.trendIcon === "↑").length / exStats.length) * 100) : 0;
  const sc = score >= 70 ? "#00C853" : score >= 40 ? "#FFD600" : "#FF4444";
  const mLabel = selectedMonth ? new Date(selectedMonth + "-01").toLocaleDateString("fr-FR", { month: "long", year: "numeric" }) : "";
  return (
    <div style={{ position: "fixed", inset: 0, background: "#080808", zIndex: 450, overflowY: "auto", maxWidth: 480, margin: "0 auto" }}>
      <div style={{ padding: "16px 16px 100px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#ff6600", fontSize: 22, cursor: "pointer" }}>{"<"}</button>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 9, color: "#555", fontFamily: "monospace" }}>BILAN MENSUEL</div>
            <h2 style={{ margin: "3px 0 0", fontSize: 18, fontWeight: 900, color: "#ff6600" }}>{mLabel.toUpperCase()}</h2>
          </div>
          <select value={selectedMonth} onChange={e => setSelectedMonth(e.target.value)} style={{ background: "#1a1a1a", border: "1px solid #2a2a2a", color: "#ccc", borderRadius: 8, padding: "6px 8px", fontSize: 10 }}>
            {allMonths.map(m => <option key={m} value={m}>{new Date(m + "-01").toLocaleDateString("fr-FR", { month: "short", year: "numeric" })}</option>)}
          </select>
        </div>
        <div style={{ background: sc + "18", border: "1px solid " + sc + "44", borderRadius: 12, padding: 16, textAlign: "center", marginBottom: 12 }}>
          <div style={{ fontSize: 8, color: "#555", fontFamily: "monospace", marginBottom: 6 }}>SCORE DU MOIS</div>
          <div style={{ fontSize: 40, fontWeight: 900, color: sc }}>{score}<span style={{ fontSize: 16 }}>%</span></div>
          <div style={{ fontSize: 10, color: "#888", marginTop: 6 }}>{monthSessions.length} séances{prevMonth ? " · mois préc. " + prevSessions.length : ""} · {exStats.length} exercices</div>
        </div>
        <div style={{ fontSize: 9, color: "#555", fontFamily: "monospace", marginBottom: 8 }}>DETAIL PAR EXERCICE</div>
        {exStats.map((ex, i) => (
          <div key={i} style={{ background: "#111", borderRadius: 10, padding: "10px 12px", marginBottom: 6, border: "1px solid #1d1d1d" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 16, color: ex.trendColor, fontWeight: 900 }}>{ex.trendIcon}</span>
                  <span style={{ fontSize: 11, fontWeight: 700, color: "#ccc" }}>{ex.name}</span>
                </div>
                <div style={{ fontSize: 9, color: ex.trendColor, marginTop: 4 }}>{ex.directive}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 11, fontWeight: 900, color: "#fff" }}>{ex.curT}<span style={{ fontSize: 8, color: "#555" }}> kg</span></div>
                {ex.diff !== null && ex.diff !== 0 && <div style={{ fontSize: 10, color: ex.diff > 0 ? "#00C853" : "#FF4444" }}>{ex.diff > 0 ? "+" : ""}{ex.diff}kg</div>}
              </div>
            </div>
            {ex.hist && ex.hist.length >= 2 && <MiniCurve hist={ex.hist} color={ex.trendColor} valueKey="tonnage" />}
          </div>
        ))}
        {exStats.length === 0 && <div style={{ color: "#555", textAlign: "center", padding: 30, fontSize: 12 }}>Aucune seance ce mois.</div>}
      </div>
    </div>
  );
}

function HomeTab({ sessions, currentSets, setTab, fatigue }) {
  const weekSessions = sessions.filter(function(s){ return (new Date() - new Date(s.date)) / 86400000 <= 7; });
  const weekTonnage = Math.round(weekSessions.reduce(function(a,s){ return a+(s.exercises||[]).reduce(function(b,ex){ return (ex.sets||[]).filter(function(st){ return st.weight&&st.reps; }).reduce(function(c,st){ return c+parseFloat(st.weight)*parseInt(st.reps); },b); },a); },0));
  const snsScore = Object.values(fatigue||{}).reduce(function(a,b){ return a+(parseInt(b)||0); },0);
  const snsColor = snsScore<=3?"#00C853":snsScore<=7?"#FFD600":snsScore<=12?"#FF8C00":"#FF4444";
  const streak = (function(){
    var dates=sessions.map(function(x){ return x.date.slice(0,10); });
    var s=0;
    for(var i=0;i<365;i++){
      var ds=new Date(Date.now()-i*86400000).toISOString().slice(0,10);
      if(dates.includes(ds)) s++;
      else if(i>0) break;
    }
    return s;
  })();
  var jours=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
  var mois=["janvier","fevrier","mars","avril","mai","juin","juillet","aout","septembre","octobre","novembre","decembre"];
  var now=new Date();
  var dateStr=jours[now.getDay()]+" "+now.getDate()+" "+mois[now.getMonth()]+" "+now.getFullYear();
  var MOTIV=["Regularite bat perfection","Chaque seance tracee est une victoire","Le bison avance toujours","Ton corps se souvient de chaque effort","Les champions se construisent dans les details","La discipline, la force demain","Pas d excuses. Des resultats.","Force et endurance, une question d habitudes."];
  var motiv=MOTIV[now.getDate()%MOTIV.length];
  var weekPct = Math.min(weekSessions.length/7, 1);
  var snsPct = Math.min(snsScore/18, 1);
  var tiles = [
    {label:"HISTORIQUE", sub:"Consulte tes seances", tab:"session", icon:"📅"},
    {label:"PROGRESSION", sub:"Tes records", tab:"progress", icon:"📈"},
    {label:"BILAN", sub:"Analyse ta semaine", tab:"bilan", icon:"📊"},
    {label:"SUPPLEMENTS", sub:"Suivi supplementation", tab:"supps", icon:"💊"},
    {label:"FATIGUE SNS", sub:"Etat de recuperation", tab:"sns", icon:"🧠"},
    {label:"SEANCE", sub:"Lance un entrainement", tab:"session", icon:"🏋️"}
  ];
  return (
    <div style={{background:"#080808",minHeight:"100vh",paddingBottom:20}}>
      <img src={window.HERO_TRAINING_SRC} style={{width:"100%",display:"block",borderRadius:"0 0 14px 14px"}}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 12px 2px"}}>
        <div style={{fontSize:11,color:"#8a3030",fontWeight:600}}>{dateStr}</div>
        <div style={{display:"flex",alignItems:"center",gap:4,background:"#1a0808",border:"1px solid #3a1010",borderRadius:20,padding:"3px 10px"}}>
          <span>🔥</span><span style={{fontSize:13,fontWeight:900,color:"#e74c3c"}}>{streak}</span><span style={{fontSize:9,color:"#5a2a2a"}}> SEANCES</span>
        </div>
      </div>
      <div style={{margin:"4px 12px 0",background:"#100808",border:"1px solid #2a1010",borderRadius:10,padding:"9px 12px",fontSize:11,color:"#e74c3c",fontStyle:"italic"}}>{motiv}</div>
      <div style={{padding:"6px 10px 0",display:"flex",flexDirection:"column",gap:6}}>
        {currentSets&&currentSets.length>0&&(
          <div style={{background:"#1a0808",border:"1px solid #c0392b",borderRadius:12,padding:"14px 16px",display:"flex",alignItems:"center",gap:14,cursor:"pointer"}} onClick={function(){ setTab("session"); }}>
            <div style={{width:42,height:42,background:"#3a0a0a",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>⚡</div>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:900,color:"#eee"}}>SEANCE EN COURS</div><div style={{fontSize:10,color:"#8a3030",marginTop:2}}>{currentSets.length} serie(s)</div></div>
            <div style={{color:"#e74c3c",fontSize:20}}>›</div>
          </div>
        )}
        <div style={{background:"#1a0808",border:"1px solid #c0392b",borderRadius:12,padding:"14px 16px",display:"flex",alignItems:"center",gap:14,cursor:"pointer"}} onClick={function(){ setTab("routines"); }}>
          <div style={{width:42,height:42,background:"#3a0a0a",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>💪</div>
          <div style={{flex:1}}><div style={{fontSize:14,fontWeight:900,color:"#eee"}}>ROUTINES</div><div style={{fontSize:10,color:"#8a3030",marginTop:2}}>Programmes prets a l emploi</div></div>
          <div style={{color:"#e74c3c",fontSize:20}}>›</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          {tiles.map(function(b){
            return (
              <div key={b.label} onClick={function(){ setTab(b.tab); }} style={{background:"#100808",border:"1px solid #2a1010",borderRadius:12,padding:"12px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:22,flexShrink:0}}>{b.icon}</span>
                <div><div style={{fontSize:11,fontWeight:900,color:"#eee"}}>{b.label}</div><div style={{fontSize:9,color:"#5a2a2a",marginTop:2}}>{b.sub}</div></div>
              </div>
            );
          })}
        </div>
        <div style={{background:"#100808",border:"1px solid #2a1010",borderRadius:12,padding:"10px 8px"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#e74c3c",letterSpacing:".12em",textAlign:"center",marginBottom:8}}>RESUME DE LA SEMAINE</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,textAlign:"center"}}>
            <div>
              <div style={{fontSize:18,fontWeight:900,color:"#eee"}}>{weekSessions.length}</div>
              <div style={{fontSize:8,color:"#5a2a2a"}}>SEANCES</div>

function SupplTab({ supps, setSupps }) {
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [filterPeriod, setFilterPeriod] = useState("actifs");

  function saveSupp(supp) {
    const updated = editing
      ? supps.map(s => s.id === supp.id ? supp : s)
      : [...supps, supp];
    setSupps(updated);
    save(KEYS.supps, updated);
    setShowForm(false);
    setEditing(null);
  }

  function deleteSupp(id) {
    if (!confirm("Supprimer ce supplément ?")) return;
    const updated = supps.filter(s => s.id !== id);
    setSupps(updated);
    save(KEYS.supps, updated);
  }

  const now = today();
  const filtered = supps.filter(s => {
    if (filterPeriod === "actifs") return !s.dateFin || s.dateFin >= now;
    if (filterPeriod === "termines") return s.dateFin && s.dateFin < now;
    return true;
  });

  const objectifColor = { "Force": "#ff6600", "Récupération": "#00C853", "Énergie": "#FFD600", "Santé générale": "#4CAF50", "Composition corporelle": "#2196F3", "Sommeil": "#9C27B0" };

  return (
    <div style={{ padding: "16px 16px 80px" }}>

      {(showForm || editing) ? (
        <SupplForm onSave={saveSupp} onCancel={() => { setShowForm(false); setEditing(null); }} initial={editing} />

        <button onClick={() => setShowForm(true)} style={{ width: "100%", background: "#1a0800", border: "1px solid #ff660044", color: "#ff6600", borderRadius: 10, padding: "12px", fontSize: 13, fontWeight: 900, cursor: "pointer", marginBottom: 14 }}>

      )}

      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        {[["actifs","ACTIFS"], ["termines","TERMINÉS"], ["tous","TOUS"]].map(([v, l]) => (
          <button key={v} onClick={() => setFilterPeriod(v)}
            style={{ flex: 1, background: filterPeriod === v ? "#ff6600" : "#1a1a1a", border: "none", color: filterPeriod === v ? "#000" : "#555", borderRadius: 8, padding: "6px 0", fontSize: 9, fontWeight: 900, cursor: "pointer", fontFamily: "monospace" }}>

      {filtered.length === 0 && (
        <div style={{ textAlign: "center", color: "#333", fontSize: 12, padding: "40px 0" }}>

function BilanTab({ fatigue, setFatigue, sessions }) {
  const [showCycleBilan, setShowCycleBilan] = useState(false);
  const [showBilanMensuel, setShowBilanMensuel] = useState(false);
  const cycleData = load(KEYS.cycle) || { startDate: (sessions[0] && sessions[0].date) || today(), num: 1 };
  const weeksElapsed = Math.max(0, Math.round((new Date(today()) - new Date(cycleData.startDate)) / 604800000));
  const cycleProgress = Math.min(100, Math.round((weeksElapsed / 16) * 100));
  const cycleAlert = weeksElapsed >= 16;
  const cycleWarn  = weeksElapsed >= 14;
  const dechargeAlert = weeksElapsed > 0 && weeksElapsed % 5 === 0 && weeksElapsed < 16;
  const cycleSessions = sessions.filter(s => s.date >= cycleData.startDate).length;
  function update(key, val) { const u = { ...fatigue, [key]: val }; setFatigue(u); save(KEYS.fatigue, u); }
  function startNewCycle() { const nc = { startDate: today(), num: (cycleData.num || 1) + 1 }; save(KEYS.cycle, nc); setShowCycleBilan(false); alert("Cycle " + nc.num + " demarre !"); }

  // Alertes groupes musculaires non entraînés depuis > 7 jours
  const MUSCLE_GROUPS = {
    "Épaules": ["Élévations latérales","Développé militaire"],
    "Pectoraux": ["Développé couché","Écarté"],
    "Triceps": ["Extension triceps","Dips"],
    "Deltoïde post.": ["Oiseau"],
    "Dos": ["Tractions","Tirage","Rowing","Pull-over"],
    "Biceps": ["Curl"],
    "Quadriceps": ["Hack squat","Leg extension","Leg press"],
    "Ischio-jambiers": ["Leg curl"],
    "Mollets": ["Mollets"],
    "Adducteurs": ["Adducteurs"]
  };
  const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
  const sevenDaysAgoStr = sevenDaysAgo.toISOString().split("T")[0];
  const muscleAlerts = Object.entries(MUSCLE_GROUPS).map(([muscle, keywords]) => {
    const lastS = [...sessions].sort((a,b)=>b.date.localeCompare(a.date)).find(s =>
      s.exercises && s.exercises.some(ex => keywords.some(kw => ex.name.includes(kw)))
    );
    if (!lastS || lastS.date < sevenDaysAgoStr) {
      const daysSince = lastS ? Math.round((new Date() - new Date(lastS.date)) / 86400000) : null;
      return { muscle, daysSince, lastDate: lastS ? lastS.date : null };
    }
    return null;
  }).filter(Boolean);

  // RIR automatique — calcul depuis les 7 derniers jours de séances
  const last7Days = new Date(); last7Days.setDate(last7Days.getDate() - 7);
  const recentSets = sessions
    .filter(s => s.date >= last7Days.toISOString().split("T")[0])
    .flatMap(s => (s.exercises || []).flatMap(e => (e.sets || []).filter(st => st.weight && st.reps && st.rir !== undefined)));
  const avgRIRRecent = recentSets.length > 0
    ? Math.round(recentSets.reduce((a, s) => a + (parseInt(s.rir) || 2), 0) / recentSets.length * 10) / 10
    : null;
  // Score RIR auto : RIR moy <= 1 → +3, <= 1.5 → +2, <= 2 → +1, > 2 → 0
  const rirAutoScore = avgRIRRecent === null ? 0 : avgRIRRecent <= 1 ? 3 : avgRIRRecent <= 1.5 ? 2 : avgRIRRecent <= 2 ? 1 : 0;

  const score = Object.values(fatigue).reduce((a, b) => a + (parseInt(b) || 0), 0) + rirAutoScore;
  const status = score <= 3  ? { level: "OPTIMAL",   color: "#00C853", msg: "Systeme nerveux en forme. Continue sur ta lancee." }
              : score <= 7  ? { level: "SURVEILLE", color: "#FFD600", msg: "Quelques signes. Respecte strictement le RIR." }
              : score <= 12 ? { level: "ALERTE",    color: "#FF8C00", msg: "Fatigue nerveuse notable. Charges -10%, RIR min 3." }
              :                { level: "DANGER",    color: "#FF4444", msg: "URGENCE : charges -20-30%, RIR min 4, volume -40%." };
  const items = [
    { key: "sleep",        label: "Qualite du sommeil",        desc: "0=Excellent  3=Tres mauvais" },
    { key: "appetite",     label: "Appetit",                   desc: "0=Normal  3=Tres diminue" },
    { key: "motivation",   label: "Motivation entrainement",   desc: "0=Top  3=Aucune envie" },
    { key: "repLoss",      label: "Perte de reps inexpliquee", desc: "0=Non  3=Oui, beaucoup" },
    { key: "techDegrades", label: "Technique qui se degrade",  desc: "0=Stable  3=Beaucoup" },
    { key: "heavyFeel",    label: "Sensation de lourdeur",     desc: "0=Normal  3=Tres lourd" },
  ];
  const phases = [
    { label: "FACILE",     weeks: "S1-5",   active: weeksElapsed <= 5,                       color: "#00C853" },
    { label: "INTERM.",    weeks: "S6-11",  active: weeksElapsed > 5 && weeksElapsed <= 11,  color: "#FFD600" },
    { label: "EPROUVANTE", weeks: "S12-16", active: weeksElapsed > 11,                       color: "#FF4444" },
  ];
  const rules = [
    "RIR jamais <2 sur mouvements lourds (bras longs + 50 ans)",
    "+1 rep a la fois. Derniere serie d'abord.",
    "Score SNS 6+ = recuperation active immediate",
    "Jamais sacrifier la technique pour une repetition",
    "Pecs : halteres et cables prioritaires (bras longs)",
    "Face pull : 3x par semaine minimum (epaules larges)",
  ];

  return (
    <div style={{ padding: "16px 16px 80px" }}>
      {showCycleBilan && <CycleBilan sessions={sessions} onClose={() => setShowCycleBilan(false)} onNewCycle={startNewCycle} />}
      {showBilanMensuel && <BilanMensuel sessions={sessions} onClose={() => setShowBilanMensuel(false)} />}

      {dechargeAlert && (

          <div style={{ fontSize: 9, color: "#4FC3F7", fontFamily: "monospace", fontWeight: 900, marginBottom: 6, letterSpacing: 1 }}>
            💤 SEMAINE DE DÉCHARGE RECOMMANDÉE
          </div>
          <div style={{ fontSize: 11, color: "#ccc", lineHeight: 1.6, marginBottom: 4 }}>
            Tu es à la semaine <strong style={{color:"#4FC3F7"}}>{weeksElapsed}</strong> de ton cycle. Une semaine de décharge va optimiser ta récupération et relancer la progression.
          </div>
          <div style={{ fontSize: 10, color: "#555", lineHeight: 1.6 }}>

      {muscleAlerts.length > 0 && (

          <div style={{ fontSize: 9, color: "#FF4444", fontFamily: "monospace", fontWeight: 900, marginBottom: 8, letterSpacing: 1 }}>

      <div style={{ fontSize: 9, color: "#ff6600", fontFamily: "monospace", marginBottom: 10, marginTop: 18 }}>REGLES D'OR</div>

      ))}
    </div>
  );
}

        localStorage.removeItem(KEYS.routines);
        localStorage.removeItem("it3_prog_version");
      }
      const savedVersion = localStorage.getItem("it3_prog_version");

      const hist = sessions.filter(s=>s.exercises&&s.exercises.some(e=>e.name===name))
        .map(s => {
          const ex = s.exercises.find(e=>e.name===name);
          const sets = ((ex&&ex.sets)||[]).filter(st=>st.weight&&st.reps);
          const tonnage = sets.reduce((a,st)=>a+parseFloat(st.weight)*parseInt(st.reps),0);
          return { date: s.date, tonnage: Math.round(tonnage), maxW: sets.length?Math.max(...sets.map(st=>parseFloat(st.weight))):0 };
        }).filter(p=>p.tonnage>0).sort((a,b)=>a.date.localeCompare(b.date));
      if (hist.length < 2) return;
      const gain = hist[hist.length-1].tonnage - hist[0].tonnage;
      const pct = Math.round((gain/hist[0].tonnage)*100);
      const cls = gain > 0 ? "up" : gain < 0 ? "down" : "";
      html += `<h2>${name} <span class="${cls}">${gain>0?"+":""}${gain}kg (${gain>0?"+":""}${pct}%)</span></h2>`;
      html += `<table><tr><th>Date</th><th>Tonnage</th><th>Poids max</th></tr>`;
      hist.forEach(p => { html += `<tr><td>${p.date}</td><td>${p.tonnage}kg</td><td>${p.maxW}kg</td></tr>`; });
      html += "</table>";
    });
    // Supplémentation active sur la période
    if (supps && supps.length > 0) {
      html += '<h2 style="border-left-color:#ff6600">SUPPLÉMENTATION</h2>';
      html += '<table><tr><th>Produit</th><th>Dosage</th><th>Fréquence</th><th>Timing</th><th>Objectif</th><th>Période</th></tr>';
      supps.forEach(function(s) {
        html += "<tr><td><strong>" + s.produit + "</strong></td><td>" + s.dosage + "</td><td>" + s.frequence + "</td><td>" + s.timing + "</td><td>" + s.objectif + "</td><td>" + s.dateDebut + (s.dateFin ? " \u2192 " + s.dateFin : " \u2192 en cours") + "</td></tr>";
        if (s.note) html += "<tr><td colspan=\"6\" style=\"color:#888;font-style:italic\">" + s.note + "</td></tr>";
      });
      html += '</table>';
    }

    html += "</body></html>";
  }

  const win = window.open("", "_blank");
  win.document.write(html);
  win.document.close();
  setTimeout(() => win.print(), 500);

function exportData() {
    const data = {
      version: "tatanka-training-v6",
      appVersion: "6.0.0",
      exportDate: today(),
      sessions: load(KEYS.sessions) || [],
      routines: load(KEYS.routines) || [],
      supps: load(KEYS.supps) || [],
      fatigue: load(KEYS.fatigue) || {},
      cycle: load(KEYS.cycle) || { startDate: ((load(KEYS.sessions)||[])[0] && (load(KEYS.sessions)||[])[0].date) || today(), num: 1 },
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "tatanka-training-backup-" + today() + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 100);
    setShowDataMenu(false);
  }

  // IMPORT — lit le JSON et fusionne les séances sans doublons
  function parseRowsToProgramme(rows) {
    const normalize = s => (s || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
    const headers = rows[0].map(normalize);
    const getCol = (row, names) => {
      for (const n of names) {
        const idx = headers.indexOf(normalize(n));
        if (idx >= 0 && row[idx] !== undefined) return String(row[idx]).trim();
      }
      return "";
    };
    const map = {};
    rows.slice(1).forEach(row => {
      const exName = getCol(row, ["exercice"]);
      if (!exName) return;
      const seanceName = getCol(row, ["seance", "séance", "session"]);
      if (!seanceName) return;
      if (!map[seanceName]) map[seanceName] = { name: seanceName, day: getCol(row, ["jour","day"]) || "", color: "#ff6600", exercises: [] };
      const ws = parseInt(getCol(row, ["echauffement","échauf.","feeder","feeder sets","warmup"])) || 0;
      map[seanceName].exercises.push({
        name: exName,
        sets: parseInt(getCol(row, ["series","séries","sets"])) || 3,
        repsTarget: getCol(row, ["reps","repetitions"]) || "8-12",
        rest: parseInt(getCol(row, ["repos (sec)","repos","rest"])) || 90,
        note: getCol(row, ["note technique","note","notes"]) || "",
        warmupSets: ws,
        warmupLabel: ws > 0 ? (ws === 1 ? "0-1" : ws <= 2 ? "1-2" : "2-3") : "",
        palierId: null,
      });
    });
    return Object.values(map).map((s, i) => ({ ...s, id: Date.now() + i }));
  }

  function importData(e) {
    const file = e.target.files[0]; if (!file) return;
    const ext = file.name.split(".").pop().toLowerCase();
    const reader = new FileReader();

    if (ext === "csv") {
      reader.onload = (ev) => {
        try {
          const text = ev.target.result;
          const sep = text.includes(";") ? ";" : ",";
          const lines = text.split("\n").map(l => l.split(sep).map(c => c.replace(/^"|"$/g,"").trim())).filter(l => l.some(c => c));
          const routines = parseRowsToProgramme(lines);
          if (!routines.length) { alert("Aucune seance trouvee dans le CSV."); return; }
          if (!confirm(routines.length + " seance(s) trouvee(s). Remplacer les routines ?")) return;
          setRoutines(routines); save(KEYS.routines, routines);
          localStorage.setItem("it3_prog_version", "imported-" + Date.now());
          alert("Import CSV OK : " + routines.length + " routine(s) creee(s).");
          setShowDataMenu(false);
        } catch(err) { alert("Erreur CSV : " + err.message); }
      };
      reader.readAsText(file, "UTF-8"); e.target.value = ""; return;
    }

    if (ext === "xlsx" || ext === "xls") {
      reader.onload = (ev) => {
        try {
          const wb = XLSX.read(ev.target.result, { type: "array" });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
          const routines = parseRowsToProgramme(rows);
          if (!routines.length) { alert("Aucune seance trouvee dans le fichier Excel."); return; }
          if (!confirm(routines.length + " seance(s) trouvee(s). Remplacer les routines ?")) return;
          setRoutines(routines); save(KEYS.routines, routines);
          localStorage.setItem("it3_prog_version", "imported-" + Date.now());
          alert("Import Excel OK : " + routines.length + " routine(s) creee(s).");
          setShowDataMenu(false);
        } catch(err) { alert("Erreur Excel : " + err.message); }
      };
      reader.readAsArrayBuffer(file); e.target.value = ""; return;
    }

    if (ext === "json") {
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.version || !data.version.includes("tatanka-training")) {
            alert("Fichier non reconnu. Exportez d'abord depuis Tatanka Training.");
            return;
          }
          if (!confirm("Restaurer les données depuis ce fichier ? Les données actuelles seront remplacées.")) return;
          if (data.sessions && data.sessions.length) {
            save(KEYS.sessions, data.sessions);
            setSessions(data.sessions);
          }
          if (data.routines && data.routines.length) {
            save(KEYS.routines, data.routines);
            setRoutines(data.routines);
          }
          if (data.supps) { save(KEYS.supps, data.supps); setSupps(data.supps); }
          if (data.fatigue) { save(KEYS.fatigue, data.fatigue); setFatigue(data.fatigue); }
          const cycleToRestore = (data.cycle && data.cycle.startDate) ? data.cycle : { startDate: (data.sessions && data.sessions[0] && data.sessions[0].date) || today(), num: 1 };
          save(KEYS.cycle, cycleToRestore);
          alert("Restauration réussie ! " + (data.sessions||[]).length + " séance(s) importée(s).");
          setShowDataMenu(false);
        } catch(err) { alert("Erreur JSON : " + err.message); }
      };
      reader.readAsText(file, "UTF-8");
      e.target.value = "";
      return;
    }

    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const importedSessions = data.sessions || (Array.isArray(data) ? data : null);
        if (!importedSessions) { alert("Format non reconnu."); return; }
        const existing = load(KEYS.sessions) || [];
        const existingIds = new Set(existing.map(s => s.id || s.date + s.routineName));
        const validSessions = importedSessions
          .filter(s => s.date && Array.isArray(s.exercises))
          .map(s => ({
            ...s,
            exercises: (s.exercises || []).map(ex => ({
              ...ex,
              sets: (ex.sets || []).map(st => ({
                ...st,
                weight: parseFloat(st.weight) || 0,
                reps: parseInt(st.reps) || 0,
                rir: parseInt(st.rir) || 2
              }))
            }))
          }));
        const newSessions = validSessions.filter(s => !existingIds.has(s.id || s.date + s.routineName));
        const merged = [...existing, ...newSessions].sort((a, b) => a.date.localeCompare(b.date));
        setSessions(merged); save(KEYS.sessions, merged);
        if (data.fatigue) { setFatigue(data.fatigue); save(KEYS.fatigue, data.fatigue); }
        if (data.cycle && data.cycle.startDate) { save(KEYS.cycle, data.cycle); }
        if (data.supps && Array.isArray(data.supps)) { setSupps(data.supps); save(KEYS.supps, data.supps); }
        // NE PAS écraser les routines depuis un backup JSON — elles sont gérées via import CSV/Excel
        alert(newSessions.length + " seance(s) importee(s). Total : " + merged.length);
        setShowDataMenu(false);
      } catch(err) { alert("Erreur JSON : " + err.message); }
    };
    reader.readAsText(file); e.target.value = "";
  }

  const dechargeAlert = weeksElapsed > 0 && weeksElapsed % 5 === 0 && weeksElapsed < 16;

    { id: "routines", label: "ROUTINES" },

    { id: "progress", label: "PROG." },
    { id: "bilan",    label: "BILAN" },
    { id: "supps",    label: "SUPP." },
    { id: "sns",      label: "SNS" },

            <div style={{ fontSize: 11, color: "#444", fontFamily: "monospace", textAlign: "center", marginBottom: 16 }}>{sessions.length} seances sauvegardees</div>

            </button>

              }

            </button>

              if (confirm("Réparer l'app ? Les routines seront réinitialisées, vos séances sont conservées.")) {

            </button>
            <button onClick={() => setShowDataMenu(false)} style={{ width: "100%", background: "none", border: "none", color: "#444", padding: "12px", fontSize: 12, cursor: "pointer", marginTop: 6 }}>Annuler</button>

        </div>

          </div>

            <span style={{ fontSize: 10, fontFamily: "monospace", color: snsColor }}>SNS {score}/18</span>
            {cycleAlert && <span style={{ fontSize: 9, color: "#FF6600", fontFamily: "monospace", fontWeight: 900 }}>S{weeksElapsed}!</span>}
